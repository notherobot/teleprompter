<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter</title>
    <style>
        :root { --accent: #ffffff; --accent-rgb: 255, 255, 255; }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        /* ══════════════════════════════════════
           INPUT SCREEN
        ══════════════════════════════════════ */
        #input-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 40px 20px;
            background: #0c0c0c;
        }

        .brand {
            font-size: 0.72rem;
            letter-spacing: 10px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .version {
            font-size: 0.62rem;
            letter-spacing: 4px;
            color: #2a2a2a;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        #input-screen h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        #input-screen .sub {
            font-size: 0.82rem;
            color: #3a3a3a;
            margin-bottom: 28px;
        }

        #script-input {
            width: min(820px, 100%);
            height: 360px;
            background: #121212;
            border: 2px solid #252525;
            border-radius: 12px;
            color: #ccc;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            line-height: 1.7;
            padding: 22px 26px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        #script-input:focus      { border-color: var(--accent); }
        #script-input::placeholder { color: #2c2c2c; }

        #start-btn {
            margin-top: 22px;
            padding: 15px 52px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.2s, transform 0.15s;
        }
        #start-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.35);
            transform: translateY(-2px);
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
        }
        .color-picker-lbl {
            font-size: 0.62rem;
            letter-spacing: 2px;
            color: #2a2a2a;
            text-transform: uppercase;
        }
        .swatch {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
            outline: none;
        }
        .swatch:hover { transform: scale(1.2); }
        .swatch.active { border-color: #555; transform: scale(1.15); }

        .key-hints {
            display: flex;
            gap: 22px;
            margin-top: 16px;
            color: #252525;
            font-size: 0.72rem;
        }
        .key-hints kbd {
            background: #181818;
            border: 1px solid #252525;
            border-radius: 3px;
            padding: 1px 6px;
            color: #383838;
            font-family: Arial, sans-serif;
            margin-right: 3px;
        }

        /* ══════════════════════════════════════
           TELEPROMPTER SCREEN
        ══════════════════════════════════════ */
        #tp-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            flex-direction: column;
        }

        #tp-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 70px;
            overflow: hidden;
        }

        /* Outer frame — sized to the viewport */
        #tp-frame {
            position: relative;
        }

        /* Arrow indicator */
        #tp-arrow {
            position: absolute;
            left: -58px;
            color: var(--accent);
            font-size: 2.4rem;
            line-height: 1;
            pointer-events: none;
            z-index: 30;
            filter: drop-shadow(0 0 12px rgba(var(--accent-rgb), 0.55));
            /* top + transform set by JS */
        }

        /* Scrollable viewport window */
        #tp-vp {
            width: 800px;
            height: 500px;
            overflow: hidden;
            position: relative;
        }

        /* Gradient masks — fade text into black at edges */
        #tp-vp::before,
        #tp-vp::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            z-index: 10;
            pointer-events: none;
        }
        #tp-vp::before {
            top: 0;
            height: 140px;
            background: linear-gradient(to bottom, #000 15%, transparent);
        }
        #tp-vp::after {
            bottom: 0;
            height: 140px;
            background: linear-gradient(to top, #000 15%, transparent);
        }

        /* Subtle reading-line highlight */
        #tp-line {
            position: absolute;
            left: 0; right: 0;
            height: 3px;
            background: linear-gradient(
                to right,
                transparent 0%,
                rgba(var(--accent-rgb), 0.07) 20%,
                rgba(var(--accent-rgb), 0.13) 50%,
                rgba(var(--accent-rgb), 0.07) 80%,
                transparent 100%
            );
            z-index: 11;
            pointer-events: none;
        }

        /* The scrolling text */
        #tp-text {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 0 36px 65vh;
            font-family: Arial, sans-serif;
            font-size: 2.2rem;
            line-height: 1.65;
            color: var(--accent);
            white-space: pre-wrap;
            word-break: break-word;
            will-change: transform;
        }

        /* Corner resize handle */
        #tp-resize {
            position: absolute;
            bottom: 0; right: 0;
            width: 26px; height: 26px;
            cursor: se-resize;
            z-index: 30;
            opacity: 0.3;
            color: var(--accent);
            transition: opacity 0.2s;
        }
        #tp-resize:hover { opacity: 1; }

        #mirror-btn.on,
        #rotate-btn.on  { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }

        /* ══════════════════════════════════════
           CONTROLS BAR
        ══════════════════════════════════════ */
        /* ══════════════════════════════════════
           DURATION STRIP
        ══════════════════════════════════════ */
        #tp-duration {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 28px 8px;
            background: #050505;
            border-top: 1px solid #0e0e0e;
            font-family: Arial, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            color: #555;
            user-select: none;
        }

        /* Scrubber track row */
        #scrub-track {
            position: relative;
            width: 700px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            cursor: pointer;
        }
        #scrub-track:hover #scrub-fill { opacity: 1; }
        #scrub-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0.6;
            pointer-events: none;
            transition: opacity 0.15s;
        }
        #scrub-head {
            position: absolute;
            top: 50%;
            width: 14px; height: 14px;
            margin-top: -7px;
            margin-left: -7px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.5);
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #scrub-head:hover,
        #scrub-head.dragging {
            transform: scale(1.35);
            box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.7);
            cursor: grabbing;
        }

        /* Time labels row */
        #dur-labels {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        #tp-duration .dur-val {
            color: #ccc;
            font-weight: 700;
            font-size: 0.82rem;
        }
        #tp-duration .dur-sep { color: #222; }

        #tp-bar {
            background: #080808;
            border-top: 1px solid #131313;
            padding: 11px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            flex-shrink: 0;
        }

        .bar-sep { width: 1px; height: 24px; background: #1c1c1c; flex-shrink: 0; }

        .bar-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-lbl {
            font-size: 0.62rem;
            letter-spacing: 1.5px;
            color: #aaa;
            text-transform: uppercase;
            margin-right: 2px;
        }

        .spd-btn {
            width: 34px; height: 32px;
            background: #131313;
            border: 1px solid #1f1f1f;
            border-radius: 5px;
            color: #aaa;
            font-family: Arial, sans-serif;
            font-size: 0.82rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
        }
        .spd-btn:hover { background: #1d1d1d; color: #fff; }
        .spd-btn.sel   { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }

        .icon-btn {
            padding: 6px 13px;
            background: #131313;
            border: 1px solid #1f1f1f;
            border-radius: 5px;
            color: #aaa;
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
        }
        .icon-btn:hover { background: #1d1d1d; color: #fff; }

        #pp-btn {
            padding: 9px 30px;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #000;
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.12s;
            white-space: nowrap;
        }
        #pp-btn:hover   { background: #ffe83a; }
        #pp-btn.paused  {
            background: #111;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .bar-hints {
            font-size: 0.66rem;
            color: #888;
            display: flex;
            gap: 16px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        #edit-btn {
            position: absolute;
            right: 16px;
            padding: 6px 14px;
            background: transparent;
            border: 1px solid #444;
            border-radius: 5px;
            color: #aaa;
            font-family: Arial, sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: color 0.12s, border-color 0.12s;
        }
        #edit-btn:hover { color: #fff; border-color: #777; }

        /* ══════════════════════════════════════
           COUNTDOWN OVERLAY
        ══════════════════════════════════════ */
        #tp-countdown {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #tp-countdown.active { display: flex; }
        #countdown-num {
            font-size: 10rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            filter: drop-shadow(0 0 60px rgba(var(--accent-rgb), 0.5));
            animation: cd-pop 1s ease-out forwards;
        }
        #countdown-label {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #444;
            text-transform: uppercase;
            margin-top: 18px;
        }
        @keyframes cd-pop {
            0%   { transform: scale(1.4); opacity: 0; }
            15%  { transform: scale(1.0); opacity: 1; }
            75%  { transform: scale(1.0); opacity: 1; }
            100% { transform: scale(0.7); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════
     INPUT SCREEN
════════════════════════════════════════ -->
<div id="input-screen">
    <div class="brand">◀ Teleprompter ▶</div>
    <div class="version">v12</div>
    <h1>YOUR SCRIPT</h1>
    <p class="sub">Paste your script below, then enter Presentation Mode</p>

    <textarea id="script-input" placeholder="Paste your script here…
Text scrolls automatically at your chosen speed.
SPACE  play / pause   ·   ↑ ↓  navigate   ·   1 – 5  set speed"></textarea>

    <button id="start-btn">▶ Presentation Mode</button>

    <div class="color-picker">
        <span class="color-picker-lbl">Color</span>
        <button class="swatch active" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        <button class="swatch" data-color="#ffdd00" style="background:#ffdd00" title="Yellow"></button>
        <button class="swatch" data-color="#39ff14" style="background:#39ff14" title="Neon Green"></button>
        <button class="swatch" data-color="#00ffff" style="background:#00ffff" title="Cyan"></button>
    </div>

    <div class="key-hints">
        <span><kbd>SPACE</kbd>play / pause</span>
        <span><kbd>↑ ↓</kbd>navigate</span>
        <span><kbd>1 – 5</kbd>set speed</span>
    </div>
</div>

<!-- ════════════════════════════════════════
     TELEPROMPTER SCREEN
════════════════════════════════════════ -->
<div id="tp-screen">
    <div id="tp-stage">
        <div id="tp-frame">
            <div id="tp-arrow">▶</div>
            <div id="tp-vp">
                <div id="tp-line"></div>
                <div id="tp-text"></div>
                <div id="tp-resize">
                    <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23 7L7 23M23 14L14 23M23 20L20 23"
                              stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div id="tp-duration">
        <div id="scrub-track">
            <div id="scrub-fill"></div>
            <div id="scrub-head"></div>
        </div>
        <div id="dur-labels">
            <span>ELAPSED&nbsp;<span class="dur-val" id="dur-elapsed">0:00</span></span>
            <span class="dur-sep">·</span>
            <span>REMAINING&nbsp;<span class="dur-val" id="dur-remaining">—</span></span>
            <span class="dur-sep">·</span>
            <span>TOTAL&nbsp;<span class="dur-val" id="dur-total">—</span></span>
        </div>
    </div>

    <div id="tp-bar">
        <!-- Speed -->
        <div class="bar-group">
            <span class="bar-lbl">Speed</span>
            <button class="spd-btn" data-s="1">1</button>
            <button class="spd-btn" data-s="2">2</button>
            <button class="spd-btn sel" data-s="3">3</button>
            <button class="spd-btn" data-s="4">4</button>
            <button class="spd-btn" data-s="5">5</button>
        </div>

        <div class="bar-sep"></div>

        <!-- Font size -->
        <div class="bar-group">
            <span class="bar-lbl">Text</span>
            <button class="icon-btn" id="sz-dn">A−</button>
            <button class="icon-btn" id="sz-up">A+</button>
        </div>

        <div class="bar-sep"></div>

        <!-- Mirror -->
        <div class="bar-group">
            <span class="bar-lbl">Mirror</span>
            <button class="icon-btn on" id="mirror-btn">⇄</button>
        </div>

        <div class="bar-sep"></div>

        <!-- Rotate -->
        <div class="bar-group">
            <span class="bar-lbl">Rotate</span>
            <button class="icon-btn" id="rotate-btn">↻</button>
        </div>

        <div class="bar-sep"></div>

        <!-- Play / Pause -->
        <button id="pp-btn">⏸ PAUSE</button>

        <div class="bar-sep"></div>

        <div class="bar-hints">
            <span>SPACE  play/pause</span>
            <span>↑↓  scroll</span>
            <span>1–5  speed</span>
        </div>

        <button id="edit-btn">✕  Edit</button>
    </div>
</div>

<!-- ════════════════════════════════════════
     COUNTDOWN OVERLAY
════════════════════════════════════════ -->
<div id="tp-countdown">
    <div id="countdown-num">5</div>
    <div id="countdown-label">Starting in…</div>
</div>

<script>
(function () {
    'use strict';

    const SPD     = { 1: 22, 2: 39, 3: 57, 4: 74, 5: 90 };
    const READ_Y  = 0.30;
    const JUMP    = 80;
    const SZ_STEP = 0.3;
    const SZ_MIN  = 1.0;
    const SZ_MAX  = 5.5;

    let playing  = false;
    let speed    = 3;
    let fontSize = 3.1;
    let scroll   = 0;
    let rafId    = null;
    let lastTs   = null;
    let mirrored = true;
    let rotated  = false;
    let rDrag = false, rX0, rY0, rW0, rH0;
    let cdTimeout = null;

    const $ = id => document.getElementById(id);
    const inputScr = $('input-screen');
    const tpScr    = $('tp-screen');
    const textarea = $('script-input');
    const vp       = $('tp-vp');
    const tpText   = $('tp-text');
    const tpArrow  = $('tp-arrow');
    const tpLine   = $('tp-line');
    const ppBtn      = $('pp-btn');
    const resizeH    = $('tp-resize');
    const scrubTrack = $('scrub-track');
    const scrubFill  = $('scrub-fill');
    const scrubHead  = $('scrub-head');
    const durElapsed   = $('dur-elapsed');
    const durRemaining = $('dur-remaining');
    const durTotal     = $('dur-total');
    const cdOverlay = $('tp-countdown');
    const cdNum     = $('countdown-num');

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `${r}, ${g}, ${b}`;
    }

    function setAccent(hex) {
        document.documentElement.style.setProperty('--accent', hex);
        const rgb = hexToRgb(hex);
        document.documentElement.style.setProperty('--accent-rgb', rgb);
        document.querySelectorAll('.swatch').forEach(s =>
            s.classList.toggle('active', s.dataset.color === hex)
        );
    }

    document.querySelectorAll('.swatch').forEach(s =>
        s.addEventListener('click', () => setAccent(s.dataset.color))
    );

    $('start-btn').addEventListener('click', enterTP);
    $('edit-btn').addEventListener('click', exitTP);
    ppBtn.addEventListener('click', togglePlay);
    $('sz-up').addEventListener('click', () => setFontSize(fontSize + SZ_STEP));
    $('sz-dn').addEventListener('click', () => setFontSize(fontSize - SZ_STEP));
    $('mirror-btn').addEventListener('click', toggleMirror);
    $('rotate-btn').addEventListener('click', toggleRotate);
    document.querySelectorAll('.spd-btn').forEach(b =>
        b.addEventListener('click', () => setSpeed(+b.dataset.s))
    );

    function enterTP() {
        const src = textarea.value.trim();
        if (!src) {
            textarea.style.borderColor = '#aa2222';
            setTimeout(() => { textarea.style.borderColor = ''; }, 700);
            textarea.focus();
            return;
        }
        tpText.textContent = src;
        tpText.style.fontSize = fontSize + 'rem';
        scroll  = 0;
        playing = false;
        inputScr.style.display = 'none';
        tpScr.style.display    = 'flex';
        requestAnimationFrame(() => requestAnimationFrame(() => {
            placeIndicators();
            render();
            syncPP();
            startRaf();
            startCountdown();
        }));
    }

    function startCountdown() {
        let n = 5;
        cdNum.textContent = n;
        cdOverlay.classList.add('active');
        function tick() {
            n--;
            if (n <= 0) {
                cdOverlay.classList.remove('active');
                playing = true;
                lastTs = null;
                syncPP();
                return;
            }
            cdNum.textContent = n;
            /* restart the pop animation */
            cdNum.style.animation = 'none';
            cdNum.offsetHeight; /* reflow */
            cdNum.style.animation = '';
            cdTimeout = setTimeout(tick, 1000);
        }
        cdTimeout = setTimeout(tick, 1000);
    }

    function cancelCountdown() {
        if (cdTimeout) { clearTimeout(cdTimeout); cdTimeout = null; }
        cdOverlay.classList.remove('active');
    }

    function exitTP() {
        cancelCountdown();
        stopRaf();
        playing = false;
        tpScr.style.display    = 'none';
        inputScr.style.display = 'flex';
    }

    function placeIndicators() {
        const y = Math.round(vp.clientHeight * READ_Y);
        tpLine.style.top   = y + 'px';
        tpArrow.style.top  = y + 'px';
        tpArrow.style.transform = 'translateY(-50%)';
    }

    function fmt(sec) {
        const s = Math.max(0, Math.round(sec));
        return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    function render() {
        const readY = vp.clientHeight * READ_Y;
        const translateY = rotated ? (scroll - readY) : (readY - scroll);
        const tx = `translateY(${translateY}px)` +
                   (mirrored ? ' scaleX(-1)' : '') +
                   (rotated  ? ' rotate(180deg)' : '');
        tpText.style.transform = tx;
        const maxS = Math.max(1, tpText.scrollHeight);
        const pct  = Math.min(1, scroll / maxS);
        scrubFill.style.width    = (pct * 100) + '%';
        scrubHead.style.left     = (pct * 100) + '%';

        const pxPerSec   = SPD[speed];
        const totalSec   = maxS / pxPerSec;
        const elapsedSec = scroll / pxPerSec;
        const remSec     = Math.max(0, totalSec - elapsedSec);
        durElapsed.textContent   = fmt(elapsedSec);
        durRemaining.textContent = fmt(remSec);
        durTotal.textContent     = fmt(totalSec);
    }

    function startRaf() {
        if (rafId) return;
        lastTs = null;
        rafId = requestAnimationFrame(tick);
    }
    function stopRaf() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }
    function tick(ts) {
        rafId = requestAnimationFrame(tick);
        const dt = lastTs === null ? 0 : ts - lastTs;
        lastTs = ts;
        if (playing && dt > 0) {
            scroll += (SPD[speed] / 1000) * dt;
            if (scroll >= tpText.scrollHeight) {
                scroll  = tpText.scrollHeight;
                playing = false;
                syncPP();
            }
        }
        render();
    }

    function togglePlay() {
        playing = !playing;
        if (playing) lastTs = null;
        syncPP();
    }
    function syncPP() {
        ppBtn.textContent = playing ? '⏸ PAUSE' : '▶  PLAY';
        ppBtn.classList.toggle('paused', !playing);
    }

    function setSpeed(s) {
        speed = s;
        document.querySelectorAll('.spd-btn').forEach(b =>
            b.classList.toggle('sel', +b.dataset.s === s)
        );
    }

    function toggleMirror() {
        mirrored = !mirrored;
        $('mirror-btn').classList.toggle('on', mirrored);
        render();
    }

    function toggleRotate() {
        rotated = !rotated;
        $('rotate-btn').classList.toggle('on', rotated);
        render();
    }

    function setFontSize(sz) {
        fontSize = Math.min(SZ_MAX, Math.max(SZ_MIN, sz));
        tpText.style.fontSize = fontSize + 'rem';
    }

    document.addEventListener('keydown', e => {
        if (tpScr.style.display === 'none') return;
        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
        switch (e.key) {
            case ' ':
                e.preventDefault();
                if (cdOverlay.classList.contains('active')) { cancelCountdown(); playing = true; lastTs = null; syncPP(); }
                else togglePlay();
                break;
            case 'ArrowDown': e.preventDefault(); scroll += JUMP; break;
            case 'ArrowUp':   e.preventDefault(); scroll = Math.max(0, scroll - JUMP); break;
            case '1': case '2': case '3': case '4': case '5': setSpeed(+e.key); break;
        }
    });

    /* ── Scrubber seek ── */
    let sDrag = false;
    let wasPlaying = false;

    function scrubTo(clientX) {
        const rect = scrubTrack.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        scroll = pct * tpText.scrollHeight;
        lastTs = null;
        render();
    }

    scrubTrack.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        sDrag = true;
        wasPlaying = playing;
        playing = false;
        scrubHead.classList.add('dragging');
        scrubTo(e.clientX);
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!sDrag) return;
        scrubTo(e.clientX);
    });
    document.addEventListener('mouseup', e => {
        if (!sDrag) return;
        sDrag = false;
        scrubHead.classList.remove('dragging');
        playing = wasPlaying;
        if (playing) lastTs = null;
        syncPP();
    });

    /* Touch support */
    scrubTrack.addEventListener('touchstart', e => {
        sDrag = true;
        wasPlaying = playing;
        playing = false;
        scrubTo(e.touches[0].clientX);
        e.preventDefault();
    }, { passive: false });
    scrubTrack.addEventListener('touchmove', e => {
        if (!sDrag) return;
        scrubTo(e.touches[0].clientX);
        e.preventDefault();
    }, { passive: false });
    scrubTrack.addEventListener('touchend', () => {
        if (!sDrag) return;
        sDrag = false;
        playing = wasPlaying;
        if (playing) lastTs = null;
        syncPP();
    });

    function startResize(clientX, clientY) {
        rDrag = true;
        rX0 = clientX; rY0 = clientY;
        rW0 = vp.clientWidth; rH0 = vp.clientHeight;
    }
    function doResize(clientX, clientY) {
        if (!rDrag) return;
        vp.style.width  = Math.max(320, rW0 + (clientX - rX0)) + 'px';
        vp.style.height = Math.max(160, rH0 + (clientY - rY0)) + 'px';
        placeIndicators();
    }

    resizeH.addEventListener('mousedown', e => {
        startResize(e.clientX, e.clientY);
        e.preventDefault(); e.stopPropagation();
    });
    document.addEventListener('mousemove', e => { doResize(e.clientX, e.clientY); });
    document.addEventListener('mouseup',   () => { rDrag = false; });

    resizeH.addEventListener('touchstart', e => {
        startResize(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault(); e.stopPropagation();
    }, { passive: false });
    resizeH.addEventListener('touchmove', e => {
        doResize(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
    }, { passive: false });
    resizeH.addEventListener('touchend', () => { rDrag = false; });

    window.addEventListener('resize', () => {
        if (tpScr.style.display !== 'none') placeIndicators();
    });
}());
</script>
</body>
</html>
